<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Grocery List</title>

<style>

:root{
  --bg:#0f172a;
  --bg2:#1e293b;
  --card:rgba(255,255,255,0.08);
  --glass:rgba(255,255,255,0.1);
  --text:#ffffff;
  --muted:#cbd5e1;
  --primary:#8b5cf6;
  --secondary:#6366f1;
  --green:#22c55e;
  --red:#ef4444;
  --border:rgba(255,255,255,0.15);
  --shadow:0 10px 30px rgba(0,0,0,0.3);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:1100px;
  margin:auto;
  padding:15px;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  padding:20px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  border-radius:0 0 20px 20px;
  box-shadow:var(--shadow);
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.logo{
  font-size:1.5rem;
  font-weight:bold;
}

.subtitle{
  margin-top:5px;
  font-size:0.9rem;
  color:#e2e8f0;
}

.date{
  margin-top:6px;
  font-size:0.8rem;
  color:#dbeafe;
}

.card{
  margin-top:18px;
  padding:18px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow);
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:12px;
}

input,
select{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  border-radius:14px;
  background:var(--glass);
  color:var(--text);
  font-size:1rem;
}

input::placeholder{
  color:var(--muted);
}

.btn{
  border:none;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
}

.btn:hover{
  transform:translateY(-2px);
}

.btn-danger{
  background:linear-gradient(135deg,#dc2626,#ef4444);
}

.search-box{
  margin-top:14px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:18px;
}

.stat-box{
  padding:15px;
  border-radius:18px;
  text-align:center;
  background:var(--card);
  border:1px solid var(--border);
}

.stat-box h3{
  font-size:1.5rem;
  margin-bottom:6px;
}

.sections{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:20px;
}

.section-box{
  background:var(--card);
  border-radius:20px;
  padding:15px;
  border:1px solid var(--border);
  min-height:300px;
  max-height:500px;
  overflow-y:auto;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  position:sticky;
  top:0;
  padding:10px;
  border-radius:12px;
  background:#111827;
}

.list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  border-radius:16px;
  background:var(--glass);
  animation:slideIn .4s ease;
  transition:.3s;
}

.item.completed{
  opacity:0.6;
  border:1px solid rgba(34,197,94,0.4);
}

.item.completed .item-name{
  text-decoration:line-through;
}

.item input[type="checkbox"]{
  width:24px;
  height:24px;
  accent-color:var(--green);
}

.item-content{
  flex:1;
}

.item-name{
  font-weight:bold;
  word-break:break-word;
}

.meta{
  margin-top:6px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag{
  padding:4px 10px;
  border-radius:20px;
  font-size:0.75rem;
  background:rgba(139,92,246,0.2);
  color:#ddd6fe;
}

.taken-tag{
  background:rgba(34,197,94,0.2);
  color:#86efac;
}

.time{
  font-size:0.75rem;
  color:var(--muted);
}

.delete-btn{
  width:38px;
  height:38px;
  border:none;
  border-radius:12px;
  background:var(--red);
  color:white;
  cursor:pointer;
}

.empty{
  text-align:center;
  padding:40px 10px;
  color:var(--muted);
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111827;
  color:white;
  padding:14px 18px;
  border-radius:14px;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.toast.show{
  opacity:1;
  transform:translateY(-10px);
}

.fab{
  position:fixed;
  left:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  color:white;
  font-size:2rem;
  cursor:pointer;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  box-shadow:var(--shadow);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  width:90%;
  max-width:350px;
  background:#111827;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

.modal-buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.modal-buttons button{
  flex:1;
}

@keyframes slideIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.shake{
  animation:shake .3s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

@media(max-width:768px){

  .sections{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:1fr;
  }

  .logo{
    font-size:1.3rem;
  }

}

</style>
</head>

<body>

<header>

  <div class="header-top">

    <div>

      <div class="logo">
        🛒 Smart Grocery
      </div>

      <div class="subtitle">
        Manage your daily shopping easily
      </div>

      <div class="date" id="date"></div>

    </div>

  </div>

</header>

<div class="container">

  <div class="card">

    <div class="input-group">

      <input
        type="text"
        id="itemInput"
        placeholder="Enter grocery item"
      >

      <select id="category">
        <option>Vegetables</option>
        <option>Fruits</option>
        <option>Dairy</option>
        <option>Snacks</option>
        <option>Beverages</option>
        <option>Household</option>
        <option>Other</option>
      </select>

      <button class="btn" id="addBtn">
        Add Grocery
      </button>

      <button class="btn" id="shareBtn">
        Share Purchase List
      </button>

      <button class="btn btn-danger"
              id="deleteAllBtn">
        Delete All
      </button>

    </div>

    <div class="search-box">

      <input
        type="text"
        id="searchInput"
        placeholder="Search grocery items..."
      >

    </div>

  </div>

  <div class="stats">

    <div class="stat-box">
      <h3 id="totalCount">0</h3>
      <p>Total</p>
    </div>

    <div class="stat-box">
      <h3 id="pendingCount">0</h3>
      <p>Pending</p>
    </div>

    <div class="stat-box">
      <h3 id="completedCount">0</h3>
      <p>Taken</p>
    </div>

  </div>

  <div class="sections">

    <div class="section-box">

      <div class="section-header">
        <h3>Pending Items</h3>
        <span id="pendingBadge">0</span>
      </div>

      <div class="list" id="pendingList"></div>

    </div>

    <div class="section-box">

      <div class="section-header">

        <h3>Taken Items</h3>

        <button class="btn"
                id="clearCompleted">
          Clear
        </button>

      </div>

      <div class="list"
           id="completedList"></div>

    </div>

  </div>

</div>

<button class="fab" id="fab">
  +
</button>

<div class="toast" id="toast"></div>

<div class="modal" id="modal">

  <div class="modal-content">

    <h2>Delete All Items?</h2>

    <p style="margin-top:10px;">
      This action cannot be undone.
    </p>

    <div class="modal-buttons">

      <button class="btn btn-danger"
              id="confirmDelete">
        Delete
      </button>

      <button class="btn"
              id="cancelDelete">
        Cancel
      </button>

    </div>

  </div>

</div>

<script>

/* ========================= */
/* ===== DOM =============== */
/* ========================= */

const itemInput =
document.getElementById("itemInput");

const category =
document.getElementById("category");

const addBtn =
document.getElementById("addBtn");

const pendingList =
document.getElementById("pendingList");

const completedList =
document.getElementById("completedList");

const searchInput =
document.getElementById("searchInput");

const toast =
document.getElementById("toast");

const totalCount =
document.getElementById("totalCount");

const pendingCount =
document.getElementById("pendingCount");

const completedCount =
document.getElementById("completedCount");

const pendingBadge =
document.getElementById("pendingBadge");

let groceries =
JSON.parse(localStorage.getItem("groceries"))
|| [];

/* ========================= */
/* ===== DATE ============== */
/* ========================= */

document.getElementById("date")
.innerText =
new Date().toDateString();

/* ========================= */
/* ===== SAVE ============== */
/* ========================= */

function saveData(){

  localStorage.setItem(
    "groceries",
    JSON.stringify(groceries)
  );
}

/* ========================= */
/* ===== TOAST ============= */
/* ========================= */

function showToast(message){

  toast.innerText = message;

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  },2000);
}

/* ========================= */
/* ===== ADD ITEM ========== */
/* ========================= */

function addItem(){

  const value =
  itemInput.value.trim();

  if(value === ""){

    itemInput.classList.add("shake");

    setTimeout(()=>{

      itemInput.classList.remove("shake");

    },300);

    return;
  }

  const item = {

    id:Date.now(),

    name:value,

    category:category.value,

    completed:false,

    time:new Date()
    .toLocaleTimeString()

  };

  groceries.unshift(item);

  saveData();

  renderItems();

  itemInput.value = "";

  showToast("Item Added");
}

/* ========================= */
/* ===== RENDER ============ */
/* ========================= */

function renderItems(){

  pendingList.innerHTML = "";
  completedList.innerHTML = "";

  const search =
  searchInput.value.toLowerCase();

  let pending = 0;
  let completed = 0;

  const filtered =
  groceries.filter(item =>
    item.name
    .toLowerCase()
    .includes(search)
  );

  filtered.forEach(item=>{

    const div =
    document.createElement("div");

    div.className =
    item.completed
    ? "item completed"
    : "item";

    div.innerHTML = `

      <input
        type="checkbox"
        ${item.completed ? "checked" : ""}
      >

      <div class="item-content">

        <div class="item-name">
          ${item.name}
        </div>

        <div class="meta">

          <span class="tag">
            ${item.category}
          </span>

          <span class="time">
            ${item.time}
          </span>

          ${
            item.completed
            ? `
            <span class="tag taken-tag">
              ✓ Taken
            </span>
            `
            : ""
          }

        </div>

      </div>

      <button class="delete-btn">
        ✕
      </button>
    `;

    /* CHECKBOX */

    div.querySelector("input")
    .addEventListener("change",e=>{

      item.completed =
      e.target.checked;

      saveData();

      renderItems();

      if(item.completed){

        showToast(
          "Item Marked As Taken"
        );

      }else{

        showToast(
          "Item Unchecked"
        );
      }

    });

    /* DELETE */

    div.querySelector(".delete-btn")
    .addEventListener("click",()=>{

      groceries =
      groceries.filter(
        g => g.id !== item.id
      );

      saveData();

      renderItems();

      showToast("Item Deleted");

    });

    /* APPEND */

    if(item.completed){

      completedList
      .appendChild(div);

      completed++;

    }else{

      pendingList
      .appendChild(div);

      pending++;
    }

  });

  /* EMPTY STATES */

  if(pendingList.innerHTML === ""){

    pendingList.innerHTML = `
      <div class="empty">
        No pending grocery items
      </div>
    `;
  }

  if(completedList.innerHTML === ""){

    completedList.innerHTML = `
      <div class="empty">
        No taken items yet
      </div>
    `;
  }

  totalCount.innerText =
  groceries.length;

  pendingCount.innerText =
  pending;

  completedCount.innerText =
  completed;

  pendingBadge.innerText =
  pending;
}

/* ========================= */
/* ===== EVENTS ============ */
/* ========================= */

addBtn.addEventListener(
  "click",
  addItem
);

itemInput.addEventListener(
  "keypress",
  e=>{

    if(e.key === "Enter"){

      addItem();
    }
  }
);

searchInput.addEventListener(
  "input",
  renderItems
);

/* ========================= */
/* ===== SHARE SYSTEM ====== */
/* ========================= */

document.getElementById("shareBtn")
.addEventListener("click",()=>{

  const pendingItems =
  groceries.filter(
    item => !item.completed
  );

  if(pendingItems.length === 0){

    showToast(
      "No Pending Items To Share"
    );

    return;
  }

  let shareText =
  "🛒 Grocery Purchase List\n\n";

  pendingItems.forEach((item,index)=>{

    shareText +=
    `${index+1}. ${item.name} (${item.category})\n`;

  });

  if(navigator.share){

    navigator.share({

      title:"Purchase List",

      text:shareText

    });

  }else{

    navigator.clipboard.writeText(
      shareText
    );

    showToast(
      "List Copied To Clipboard"
    );
  }

});

/* ========================= */
/* ===== CLEAR TAKEN ======= */
/* ========================= */

document.getElementById("clearCompleted")
.addEventListener("click",()=>{

  groceries =
  groceries.filter(
    item => !item.completed
  );

  saveData();

  renderItems();

  showToast(
    "Taken Items Cleared"
  );
});

/* ========================= */
/* ===== FLOAT BUTTON ====== */
/* ========================= */

document.getElementById("fab")
.addEventListener("click",()=>{

  itemInput.focus();

  window.scrollTo({

    top:0,

    behavior:"smooth"

  });

});

/* ========================= */
/* ===== MODAL ============= */
/* ========================= */

const modal =
document.getElementById("modal");

document.getElementById("deleteAllBtn")
.addEventListener("click",()=>{

  modal.style.display = "flex";

});

document.getElementById("cancelDelete")
.addEventListener("click",()=>{

  modal.style.display = "none";

});

document.getElementById("confirmDelete")
.addEventListener("click",()=>{

  groceries = [];

  saveData();

  renderItems();

  modal.style.display = "none";

  showToast(
    "All Items Deleted"
  );

});

/* ========================= */
/* ===== INIT ============== */
/* ========================= */

renderItems();

</script>

</body>
</html>
