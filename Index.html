<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Grocery List</title>

<style>

:root{
  --bg:#0f172a;
  --bg2:#1e293b;
  --card:rgba(255,255,255,0.08);
  --glass:rgba(255,255,255,0.1);
  --text:#ffffff;
  --muted:#cbd5e1;
  --primary:#8b5cf6;
  --secondary:#6366f1;
  --green:#22c55e;
  --red:#ef4444;
  --border:rgba(255,255,255,0.15);
  --shadow:0 10px 30px rgba(0,0,0,0.3);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:1100px;
  margin:auto;
  padding:15px;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  padding:20px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  border-radius:0 0 20px 20px;
  box-shadow:var(--shadow);
}

.logo{
  font-size:1.6rem;
  font-weight:bold;
}

.subtitle{
  margin-top:5px;
  color:#e2e8f0;
}

.date{
  margin-top:8px;
  font-size:0.85rem;
  color:#dbeafe;
}

.card{
  margin-top:18px;
  padding:18px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow);
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:12px;
}

input,
select{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  border-radius:14px;
  background:var(--glass);
  color:var(--text);
  font-size:1rem;
}

input::placeholder{
  color:var(--muted);
}

.btn{
  border:none;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
}

.btn-danger{
  background:linear-gradient(135deg,#dc2626,#ef4444);
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:18px;
}

.stat-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:15px;
  text-align:center;
}

.stat-box h3{
  font-size:1.5rem;
  margin-bottom:5px;
}

.sections{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:20px;
}

.section-box{
  background:var(--card);
  border-radius:20px;
  padding:15px;
  border:1px solid var(--border);
  min-height:300px;
  max-height:500px;
  overflow-y:auto;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  background:#111827;
  padding:10px;
  border-radius:12px;
}

.list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--glass);
  border-radius:16px;
  padding:14px;
  transition:0.3s;
}

.item.completed{
  opacity:0.6;
  border:1px solid rgba(34,197,94,0.4);
}

.item.completed .item-name{
  text-decoration:line-through;
}

.item input[type="checkbox"]{
  width:24px;
  height:24px;
  accent-color:var(--green);
}

.item-content{
  flex:1;
}

.item-name{
  font-weight:bold;
}

.meta{
  margin-top:6px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tag{
  padding:4px 10px;
  border-radius:20px;
  font-size:0.75rem;
  background:rgba(139,92,246,0.2);
  color:#ddd6fe;
}

.taken-tag{
  background:rgba(34,197,94,0.2);
  color:#86efac;
}

.time{
  font-size:0.75rem;
  color:var(--muted);
}

.delete-btn{
  width:38px;
  height:38px;
  border:none;
  border-radius:12px;
  background:var(--red);
  color:white;
  cursor:pointer;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111827;
  color:white;
  padding:14px 18px;
  border-radius:14px;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.toast.show{
  opacity:1;
  transform:translateY(-10px);
}

.empty{
  text-align:center;
  padding:40px 10px;
  color:var(--muted);
}

@media(max-width:768px){

  .sections{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<header>

  <div class="logo">
    🛒 Smart Grocery
  </div>

  <div class="subtitle">
    Manage your daily shopping easily
  </div>

  <div class="date" id="date"></div>

</header>

<div class="container">

  <div class="card">

    <div class="input-group">

      <input
        type="text"
        id="itemInput"
        placeholder="Enter grocery item"
      >

      <select id="category">
        <option>Vegetables</option>
        <option>Fruits</option>
        <option>Dairy</option>
        <option>Snacks</option>
        <option>Beverages</option>
        <option>Household</option>
        <option>Other</option>
      </select>

      <button class="btn" id="addBtn">
        Add Grocery
      </button>

      <button class="btn" id="shareBtn">
        Share Purchase List
      </button>

      <button class="btn btn-danger"
              id="deleteAllBtn">
        Delete All
      </button>

    </div>

  </div>

  <div class="stats">

    <div class="stat-box">
      <h3 id="totalCount">0</h3>
      <p>Total</p>
    </div>

    <div class="stat-box">
      <h3 id="pendingCount">0</h3>
      <p>Pending</p>
    </div>

    <div class="stat-box">
      <h3 id="completedCount">0</h3>
      <p>Taken</p>
    </div>

  </div>

  <div class="sections">

    <div class="section-box">

      <div class="section-header">
        <h3>Pending Items</h3>
        <span id="pendingBadge">0</span>
      </div>

      <div class="list" id="pendingList"></div>

    </div>

    <div class="section-box">

      <div class="section-header">
        <h3>Taken Items</h3>
      </div>

      <div class="list" id="completedList"></div>

    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>

/* ========================= */
/* ===== SHARE PAGE ======== */
/* ========================= */

const params =
new URLSearchParams(window.location.search);

const shareId =
params.get("share");

if(shareId){

  const sharedData =
  JSON.parse(
    localStorage.getItem(shareId)
  ) || [];

  document.body.innerHTML = `

  <style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    padding:20px;
  }

  .container{
    max-width:700px;
    margin:auto;
  }

  .header{
    text-align:center;
    margin-bottom:25px;
  }

  .header h1{
    font-size:2rem;
    margin-bottom:10px;
  }

  .list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .item{
    display:flex;
    align-items:center;
    gap:14px;
    background:rgba(255,255,255,0.08);
    padding:16px;
    border-radius:18px;
  }

  .item.completed{
    opacity:0.6;
    border:1px solid #22c55e;
  }

  .item.completed .name{
    text-decoration:line-through;
  }

  input[type="checkbox"]{
    width:24px;
    height:24px;
    accent-color:#22c55e;
  }

  .content{
    flex:1;
  }

  .name{
    font-size:1rem;
    font-weight:bold;
  }

  .category{
    margin-top:5px;
    color:#cbd5e1;
    font-size:0.8rem;
  }

  .taken{
    margin-top:8px;
    display:none;
    width:max-content;
    padding:5px 10px;
    border-radius:20px;
    background:rgba(34,197,94,0.2);
    color:#86efac;
    font-size:0.75rem;
    font-weight:bold;
  }

  .item.completed .taken{
    display:inline-block;
  }

  </style>

  <div class="container">

    <div class="header">

      <h1>🛒 Purchase List</h1>

      <p>
        Mark items after purchasing
      </p>

    </div>

    <div class="list" id="sharedList"></div>

  </div>
  `;

  const sharedList =
  document.getElementById("sharedList");

  sharedData.forEach(item=>{

    const div =
    document.createElement("div");

    div.className = "item";

    div.innerHTML = `

      <input type="checkbox">

      <div class="content">

        <div class="name">
          ${item.name}
        </div>

        <div class="category">
          ${item.category}
        </div>

        <div class="taken">
          ✓ Taken
        </div>

      </div>
    `;

    const checkbox =
    div.querySelector("input");

    checkbox.addEventListener(
      "change",
      ()=>{

        if(checkbox.checked){

          div.classList.add("completed");

        }else{

          div.classList.remove("completed");

        }

      }
    );

    sharedList.appendChild(div);

  });

}else{

/* ========================= */
/* ===== MAIN APP ========== */
/* ========================= */

const itemInput =
document.getElementById("itemInput");

const category =
document.getElementById("category");

const addBtn =
document.getElementById("addBtn");

const pendingList =
document.getElementById("pendingList");

const completedList =
document.getElementById("completedList");

const toast =
document.getElementById("toast");

const totalCount =
document.getElementById("totalCount");

const pendingCount =
document.getElementById("pendingCount");

const completedCount =
document.getElementById("completedCount");

const pendingBadge =
document.getElementById("pendingBadge");

let groceries =
JSON.parse(
  localStorage.getItem("groceries")
) || [];

document.getElementById("date")
.innerText =
new Date().toDateString();

function saveData(){

  localStorage.setItem(
    "groceries",
    JSON.stringify(groceries)
  );
}

function showToast(message){

  toast.innerText = message;

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  },2000);
}

function addItem(){

  const value =
  itemInput.value.trim();

  if(value === "") return;

  groceries.unshift({

    id:Date.now(),

    name:value,

    category:category.value,

    completed:false,

    time:new Date()
    .toLocaleTimeString()

  });

  itemInput.value = "";

  saveData();

  renderItems();

  showToast("Item Added");
}

function renderItems(){

  pendingList.innerHTML = "";
  completedList.innerHTML = "";

  let pending = 0;
  let completed = 0;

  groceries.forEach(item=>{

    const div =
    document.createElement("div");

    div.className =
    item.completed
    ? "item completed"
    : "item";

    div.innerHTML = `

      <input
        type="checkbox"
        ${item.completed ? "checked" : ""}
      >

      <div class="item-content">

        <div class="item-name">
          ${item.name}
        </div>

        <div class="meta">

          <span class="tag">
            ${item.category}
          </span>

          <span class="time">
            ${item.time}
          </span>

          ${
            item.completed
            ? `
            <span class="tag taken-tag">
              ✓ Taken
            </span>
            `
            : ""
          }

        </div>

      </div>

      <button class="delete-btn">
        ✕
      </button>
    `;

    div.querySelector("input")
    .addEventListener("change",e=>{

      item.completed =
      e.target.checked;

      saveData();

      renderItems();

    });

    div.querySelector(".delete-btn")
    .addEventListener("click",()=>{

      groceries =
      groceries.filter(
        g => g.id !== item.id
      );

      saveData();

      renderItems();

    });

    if(item.completed){

      completedList.appendChild(div);

      completed++;

    }else{

      pendingList.appendChild(div);

      pending++;
    }

  });

  if(pendingList.innerHTML === ""){

    pendingList.innerHTML =
    `<div class="empty">
      No pending items
    </div>`;
  }

  if(completedList.innerHTML === ""){

    completedList.innerHTML =
    `<div class="empty">
      No taken items
    </div>`;
  }

  totalCount.innerText =
  groceries.length;

  pendingCount.innerText =
  pending;

  completedCount.innerText =
  completed;

  pendingBadge.innerText =
  pending;
}

/* ADD */

addBtn.addEventListener(
  "click",
  addItem
);

itemInput.addEventListener(
  "keypress",
  e=>{

    if(e.key === "Enter"){

      addItem();
    }
  }
);

/* SHARE */

document.getElementById("shareBtn")
.addEventListener("click",()=>{

  const pendingItems =
  groceries.filter(
    item => !item.completed
  );

  if(pendingItems.length === 0){

    showToast(
      "No Pending Items"
    );

    return;
  }

  const shareId =
  "list_" + Date.now();

  localStorage.setItem(
    shareId,
    JSON.stringify(pendingItems)
  );

  const shareUrl =
  window.location.origin +
  window.location.pathname +
  "?share=" + shareId;

  if(navigator.share){

    navigator.share({

      title:"Purchase List",

      text:"Open Grocery Purchase List",

      url:shareUrl

    });

  }else{

    navigator.clipboard.writeText(
      shareUrl
    );

    showToast(
      "Link Copied"
    );
  }

});

/* DELETE ALL */

document.getElementById("deleteAllBtn")
.addEventListener("click",()=>{

  groceries = [];

  saveData();

  renderItems();

  showToast(
    "All Items Deleted"
  );

});

renderItems();

}

</script>

</body>
</html>
